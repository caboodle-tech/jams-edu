<script>
    title = (typeof title !== 'undefined' && title) ? title : 'JamsEdu';
    description = (typeof description !== 'undefined' && description) ? description :
        'JamsEdu static site generator for teaching and open content.';
</script>
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="/assets/css/main.css" rel="stylesheet">
        <title><script>$echo(title);</script></title>
        <script>
            if (description) {
                $echo(`<meta name="description" content="${description}">`);
            }
            if (author) {
                $echo(`<meta name="author" content="${author}">`);
            }
            if (date) {
                $echo(`<meta name="date" content="${date}">`);
            }
            if (keywords) {
                $echo(`<meta name="keywords" content="${keywords}">`);
            }
        </script>
        <script type="module" src="/assets/js/main.js"></script>
        <script src="/assets/js/theme-preference.js"></script>
    </head>
