name: Deploy Website

on:
  push:
    branches:
      - main

permissions:
  contents: write

# Opt in to Node 24 for JavaScript actions before the runner default flips (see GitHub Actions changelog).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6.0.2

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2.2.0
        with:
          version: release

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10

      - name: Use Node.js 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build 🔧
        run: node ./bin/cli.js --build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          folder: www/public
          branch: website
          clean: true
