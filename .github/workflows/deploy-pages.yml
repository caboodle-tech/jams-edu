name: Deploy Website

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 24.14.0
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build 🔧
        run: node ./bin/cli.js --build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: www/public
          branch: website
          clean: true
